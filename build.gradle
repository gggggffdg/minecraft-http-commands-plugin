import io.papermc.hangarpublishplugin.model.Platforms

plugins {
    id 'java'
    id 'org.openapi.generator' version '7.9.0'
    id 'io.papermc.hangar-publish-plugin' version '0.1.2'
    id 'com.gradleup.shadow' version '9.3.1'
}

group = 'me.lenaic.httpcommands'
version = '1.2.0'

java {
    // Compile and target to Java 8 bytecode so the plugin can run on Java 8 up to the latest JDK.
    sourceCompatibility = JavaVersion.VERSION_1_8
    targetCompatibility = JavaVersion.VERSION_1_8
}

repositories {
    mavenCentral()
    // Snapshot repository for older Spigot/Paper API artifacts (1.8.8 etc.)
    maven {
        url = 'https://hub.spigotmc.org/nexus/content/repositories/snapshots/'
    }
    maven {
        name = 'papermc'
        url = 'https://repo.papermc.io/repository/maven-public/'
    }
    maven {
        name = 'jitpack'
        url = 'https://jitpack.io'
    }
}

dependencies {
    // Use an API compatible with Java 8 (match your server: patched 1.8.8)
    compileOnly 'org.spigotmc:spigot-api:1.8.8-R0.1-SNAPSHOT'
    compileOnly 'com.github.MilkBowl:VaultAPI:1.7'
    implementation 'com.google.code.gson:gson:2.13.2'
    implementation 'org.bstats:bstats-bukkit:3.1.0'
    implementation 'org.bstats:bstats-base:3.1.0'
}

tasks.withType(JavaCompile) {
    options.encoding = 'UTF-8'
    // Ensure the generated bytecode and available APIs are compatible with Java 8.
    // This allows building with newer JDKs while targeting Java 8 runtime.
    options.release = 8
}

/* ShadowJar configuration */
tasks.shadowJar {
    // Only include bStats in the final jar
    dependencies {
        include(dependency('org.bstats:bstats-bukkit:3.1.0'))
        include(dependency('org.bstats:bstats-base:3.1.0'))
    }

    // Relocate bStats into the plugin's package to avoid conflicts with other
    // plugins using bStats
    relocate("org.bstats", project.group.toString())

    // Ensure the shadow JAR is named as requested
    archiveFileName = 'ProMcSecure.jar'
}

/* Jar task (non-shadow jar) filename — keep consistent */
jar {
    archiveFileName = 'ProMcSecure.jar'
}

// Generate HTML API documentation from OpenAPI spec
openApiGenerate {
    generatorName = 'html2'
    inputSpec = "$projectDir/src/main/api/openapi.yaml"
    outputDir = "$projectDir/docs"
}

hangarPublish {
    publications.register("plugin") {
        version.set(project.version as String)
        channel.set("Release") // We're using the 'Snapshot' channel
        // TODO: Edit the project name to match your Hangar project
        id.set("http-commands")
        apiKey.set(System.getenv("HANGAR_API_TOKEN"))
        platforms {
            // TODO: Use the correct platform(s) for your plugin
            register(Platforms.PAPER) {
                // TODO: If you're using ShadowJar, replace the jar lines with the appropriate task:
                //   jar.set(tasks.shadowJar.flatMap { it.archiveFile })
                // Set the JAR file to upload
                jar.set(tasks.shadowJar.archiveFile)

                // Set platform versions from gradle.properties file
                def versions = (property("paperVersion") as String)
                        .split(",")
                        .collect { it.trim() }
                platformVersions.set(versions)
            }
        }
    }
}
